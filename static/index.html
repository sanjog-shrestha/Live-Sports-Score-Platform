<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>⚽ Live Sports Scores</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="topbar">
        <h1>⚽ Live Scores</h1>
        <div class="tagline">Football & basketball, update live</div>
        <div id="status" class="status">connecting...</div>
    </header>

    <input type="text" id="searchInput" placeholder="Search by team name...">
    <div id="scores"></div>

    <h2>Standings</h2>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Team</th>
                <th>P</th>
                <th>W</th>
                <th>D</th>
                <th>L</th>
                <th>GD</th>
                <th>Pts</th>
            </tr>
        </thead>
        <tbody id="standingsBody"></tbody>
    </table>

    <script src="app.js"></script>
</body>

</html>
