<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>⚽ Live Sports Scores</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="toastContainer" class="toast-container"></div>

    <header class="topbar">
        <h1>⚽ Live Scores</h1>
        <div class="tagline">Football & basketball, updated live</div>
        <div id="status">connecting...</div>
    </header>

    <input type="text" id="searchInput" placeholder="Search by team name...">
    <label class="favorites-toggle">
        <input type="checkbox" id="favoritesOnly">
        Show favorites only
    </label>
    <div class="favorites-manager">
        <label for="teamPicker">Add a favorite team (from recent results):</label>
        <select id="teamPicker">
            <option value="">Select a team…</option>
        </select>
        <button type="button" id="addFavoriteBtn">★ Add</button>
        <div id="favoritesList" class="favorites-list"></div>
    </div>
    <div id="teamPage" class="team-page" style="display: none;"></div>
    <div id="scores"></div>

    <h2>Standings</h2>
    <h2>Premier League 2024</h2>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Team</th>
                <th>P</th>
                <th>W</th>
                <th>D</th>
                <th>L</th>
                <th>GD</th>
                <th>Pts</th>
            </tr>
        </thead>
        <tbody id="standingsBody"></tbody>
    </table>

    <h2>🥇 Top Scorers</h2>
    <h2>Premier League 2024</h2>
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Player</th>
                <th>Team</th>
                <th>Apps</th>
                <th>Goals</th>
                <th>Assists</th>
            </tr>
        </thead>
        <tbody id="topScorersBody"></tbody>
    </table>

    <script src="app.js"></script>
</body>

</html>
